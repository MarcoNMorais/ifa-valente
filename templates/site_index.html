<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secretaria Municipal de Saúde de Valente</title>
  <style>
    :root {
      --azul: #003b7a;
      --azul-2: #0b5ca8;
      --azul-claro: #dff4ff;
      --verde: #0b8f7a;
      --texto: #07305f;
      --cinza: #617389;
      --borda: #dbe7f1;
      --card: rgba(255, 255, 255, 0.86);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--texto);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 22%, rgba(10, 142, 197, 0.24) 0, rgba(10, 142, 197, 0.08) 26%, transparent 46%),
        radial-gradient(circle at 82% 18%, rgba(11, 92, 168, 0.22) 0, rgba(11, 92, 168, 0.08) 28%, transparent 50%),
        radial-gradient(circle at 72% 82%, rgba(11, 143, 122, 0.18) 0, rgba(11, 143, 122, 0.07) 28%, transparent 48%),
        linear-gradient(135deg, #eefaff 0%, #dff4ff 45%, #f6fbff 100%);
      overflow: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      filter: blur(18px);
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
      animation: flutuar 10s ease-in-out infinite alternate;
    }

    body::before {
      width: 360px;
      height: 360px;
      left: -110px;
      top: -90px;
      background: rgba(0, 117, 171, 0.22);
    }

    body::after {
      width: 430px;
      height: 430px;
      right: -130px;
      bottom: -120px;
      background: rgba(11, 143, 122, 0.16);
      animation-delay: 1.5s;
    }

    @keyframes flutuar {
      from {
        transform: translateY(0) scale(1);
      }
      to {
        transform: translateY(22px) scale(1.04);
      }
    }

    .pagina {
      width: 100%;
      max-width: 980px;
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 46px 28px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.54);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 30px 80px rgba(0, 59, 122, 0.12);
      backdrop-filter: blur(8px);
    }

    .logo-secretaria {
      width: min(370px, 85vw);
      max-height: 175px;
      object-fit: contain;
      margin: 0 auto 28px;
      display: none;
    }

    .titulo {
      margin: 0;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: -1.5px;
      color: var(--azul);
      text-shadow: 0 6px 18px rgba(0, 59, 122, 0.10);
    }

    .subtitulo {
      margin: 14px 0 34px;
      font-size: clamp(17px, 2vw, 23px);
      color: var(--cinza);
      font-weight: 500;
    }

    .botoes {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 300px));
      align-items: stretch;
      justify-content: center;
      gap: 22px;
      margin-top: 10px;
    }

    .botao-sistema {
      width: 100%;
      height: 96px;
      min-height: 96px;
      max-height: 96px;
      padding: 18px 24px;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.76);
      background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(238,248,254,0.9));
      color: var(--texto);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-shadow: 0 16px 34px rgba(0, 59, 122, 0.13);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .botao-sistema:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 48px rgba(0, 59, 122, 0.20);
      border-color: rgba(11, 92, 168, 0.28);
    }

    .botao-sistema:focus {
      outline: 4px solid rgba(11, 92, 168, 0.22);
      outline-offset: 3px;
    }

    .botao-sistema img {
      width: 62px;
      height: 62px;
      object-fit: contain;
      flex: 0 0 auto;
      display: none;
    }

    .botao-texto {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
      line-height: 1.1;
    }

    .botao-titulo {
      font-size: 30px;
      font-weight: 800;
      color: var(--azul);
    }

    .botao-desc {
      margin-top: 7px;
      font-size: 14px;
      color: var(--cinza);
      font-weight: 600;
    }

    .botao-cis .botao-titulo {
      color: var(--verde);
    }


    .botao-hospital .botao-titulo {
      color: #1a6fa7;
    }

.botao-hospital {
      grid-column: 1;
      grid-row: 2;
      height: 96px;
      min-height: 96px;
      max-height: 96px;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      padding-top: 18px;
      padding-bottom: 18px;
    }

    .botao-hospital .logo-hospital {
      display: block;
      width: 74px;
      height: 46px;
      max-height: 46px;
      object-fit: contain;
      flex: 0 0 74px;
    }

    @media (max-width: 980px) {
      .botoes {
        grid-template-columns: repeat(2, minmax(240px, 300px));
      }
    }
    .desenvolvido {
      margin: 18px auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: rgba(7, 48, 95, 0.68);
      font-size: 14px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .desenvolvido img {
      width: 140px;
      max-height: 78px;
      object-fit: contain;
      opacity: 0.88;
      filter: saturate(0.96);
      border-radius: 8px;
    }

    .desenvolvido strong {
      color: rgba(7, 48, 95, 0.86);
      font-weight: 800;
    }

    @media (max-width: 640px) {
      .desenvolvido {
        margin-top: 26px;
        flex-direction: column;
        gap: 8px;
      }

      .desenvolvido img {
        width: 112px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 20px;
        overflow: auto;
      }

      .pagina {
        padding: 34px 20px;
        border-radius: 28px;
      }

      .botoes {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .botao-hospital {
        grid-column: auto;
        grid-row: auto;
      }

      .botao-sistema {
        width: 100%;
        height: 88px;
        min-height: 88px;
        max-height: 88px;
      }

      .botao-hospital .logo-hospital {
        width: 68px;
        height: 42px;
        max-height: 42px;
        flex-basis: 68px;
      }

      .botao-titulo {
        font-size: 26px;
      }
    }
  </style>
</head>

  <script>
    function carregarLogo(img) {
      if (!img) return;

      const fontes = (img.dataset.srcs || "")
        .split("|")
        .map(item => item.trim())
        .filter(Boolean);

      let indice = 0;

      function tentar() {
        if (indice >= fontes.length) {
          img.style.display = "none";
          return;
        }

        img.onload = function () {
          img.style.display = "block";
        };

        img.onerror = function () {
          indice += 1;
          tentar();
        };

        img.src = fontes[indice];
      }

      tentar();
    }

    carregarLogo(document.getElementById("logoSecretaria"));
    carregarLogo(document.getElementById("logoIfa"));
    carregarLogo(document.getElementById("logoCis"));
  </script>
